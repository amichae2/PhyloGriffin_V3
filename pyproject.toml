[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"phylogriffin/__init__.py" = ["F401"]
"phylogriffin/model/__init__.py" = ["F401"]
"phylogriffin/train/__init__.py" = ["F401"]
"phylogriffin_v3_colab.ipynb" = ["E402", "E741", "F541", "B905"]
"tests/*.py" = ["E741"]

[tool.ruff.format]
quote-style = "double"
